name: Check for Absolute Paths

on:
  push:
  pull_request:

jobs:
  check-paths:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for Windows absolute paths
        run: |
          if grep -RE "[A-Z]:\\\\" --include=\*.qxw --include=\*.qxf .; then
            echo "ERROR: Absolute paths detected."
            echo "Run paths_to_token.bat before committing."
            exit 1
          fi
